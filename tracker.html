<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lacak Pesanan - MANSIX MARKET</title>
     
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%;
            border-top: 3px solid #f97316; width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased flex justify-center items-start min-h-screen text-slate-800">

    <div id="root" class="w-full max-w-md min-h-screen bg-slate-50 relative flex flex-col shadow-2xl ring-1 ring-slate-900/5"></div>

    <script type="text/babel">
        const Icon = {
            ChevronLeft: ({ className = "w-6 h-6" }) => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" className={className}><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>,
            CheckCircle: ({ className = "w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        };

        const formatRupiah = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        function App() {
            const [searchQuery, setSearchQuery] = React.useState('');
            const [isSearching, setIsSearching] = React.useState(false);
            const [orderData, setOrderData] = React.useState(null);
            const [error, setError] = React.useState('');

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;

                setIsSearching(true);
                setError('');
                setOrderData(null);

                try {
                    const response = await fetch("https://script.google.com/macros/s/AKfycbwBODV8hs85b-M6aJUMOmmEEWZl02IGRNgzQCvAQkFXk_kbk4IHAB-TxK-gbp4fxqAAxQ/exec");
                    const data = await response.json();
                    
                    // Mencari data berdasarkan Kode Unik (Kolom B)
                    const found = data.find(item => item.orderCode.toString().toUpperCase() === searchQuery.toUpperCase());
                    
                    if (found) {
                        setOrderData({
                            orderCode: found.orderCode,
                            status: found.status || 'menunggu',
                            total: found.total
                        });
                    } else {
                        setError('Pesanan tidak ditemukan. Cek kembali kode unik Anda.');
                    }
                } catch (err) {
                    setError('Gagal terhubung ke database. Coba lagi nanti.');
                } finally {
                    setIsSearching(false);
                }
            };

            const getStatusIndex = (status) => {
                const map = { 'menunggu': 0, 'sedang_disiapkan': 1, 'siap_diambil': 2, 'selesai': 3 };
                return map[status.toLowerCase().replace(/\s/g, '_')] || 0;
            };

            return (
                <div className="flex-1 flex flex-col p-5 space-y-6">
                    <header className="flex items-center gap-4 mb-4">
                        <button onClick={() => window.history.back()} className="w-10 h-10 flex items-center justify-center bg-white border rounded-full"><Icon.ChevronLeft /></button>
                        <h2 className="text-lg font-bold">Lacak Pesanan</h2>
                    </header>

                    <form onSubmit={handleSearch} className="bg-white p-6 rounded-3xl border shadow-sm">
                        <input 
                            type="text" 
                            placeholder="Masukkan Kode Unik (e.g. T06RK1)" 
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="w-full bg-slate-50 border rounded-2xl py-3 px-4 mb-4 focus:ring-2 focus:ring-brand-500 outline-none"
                        />
                        <button type="submit" className="w-full py-3 bg-brand-500 text-white rounded-2xl font-bold">
                            {isSearching ? <div className="loader mx-auto"></div> : "Lacak Pesanan"}
                        </button>
                    </form>

                    {error && <div className="text-red-500 text-center font-bold text-sm">{error}</div>}

                    {orderData && (
                        <div className="bg-white p-6 rounded-3xl border shadow-sm animate-in fade-in zoom-in duration-300">
                            <h3 className="font-bold mb-4 text-slate-800">Status: {orderData.orderCode}</h3>
                            <div className="space-y-4">
                                {['menunggu', 'sedang_disiapkan', 'siap_diambil', 'selesai'].map((s, i) => (
                                    <div key={s} className="flex items-center gap-3">
                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center ${i <= getStatusIndex(orderData.status) ? 'bg-brand-500' : 'bg-slate-200'}`}>
                                            {i <= getStatusIndex(orderData.status) && <Icon.CheckCircle className="w-4 h-4 text-white" />}
                                        </div>
                                        <span className={`capitalize font-medium ${i === getStatusIndex(orderData.status) ? 'text-brand-600 font-bold' : 'text-slate-500'}`}>
                                            {s.replace('_', ' ')}
                                        </span>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-6 pt-6 border-t font-bold text-lg text-slate-800">
                                Total: {formatRupiah(orderData.total)}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
