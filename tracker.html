<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lacak Pesanan - MANSIX MARKET</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { 500: '#f97316' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fff7ed; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border: 3px solid #fb923c33; border-top: 3px solid #f97316; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="antialiased min-h-screen flex justify-center items-center p-4">

    <div id="root" class="w-full max-w-sm"></div>

    <script type="text/babel">
        const App = () => {
            const [query, setQuery] = React.useState('');
            const [order, setOrder] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            const handleSearch = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch("https://script.google.com/macros/s/AKfycbwBODV8hs85b-M6aJUMOmmEEWZl02IGRNgzQCvAQkFXk_kbk4IHAB-TxK-gbp4fxqAAxQ/exec");
                    const data = await res.json();
                    const found = data.find(i => i.orderCode.toString().toUpperCase() === query.toUpperCase());
                    setOrder(found || "NOT_FOUND");
                } catch { setOrder("ERROR"); }
                setLoading(false);
            };

            // Status baru: Process, Success, Canceled
            const getStatusDisplay = (status) => {
                const s = status?.toLowerCase();
                if (s === 'canceled') return { label: 'Dibatalkan', color: 'bg-red-500' };
                if (s === 'success') return { label: 'Berhasil', color: 'bg-green-500' };
                return { label: 'Sedang Diproses', color: 'bg-orange-500' };
            };

            return (
                <div className="space-y-6">
                    <div className="text-center space-y-1">
                        <h1 className="text-3xl font-extrabold text-orange-600">MANSIX</h1>
                        <p className="text-orange-400 font-medium text-sm uppercase tracking-widest">Tracking Service</p>
                    </div>

                    <form onSubmit={handleSearch} className="glass p-6 rounded-3xl shadow-xl shadow-orange-500/10">
                        <input 
                            className="w-full bg-white/50 border border-orange-100 rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-orange-200 transition mb-3 text-center font-bold tracking-widest"
                            placeholder="KODE PESANAN"
                            value={query} onChange={e => setQuery(e.target.value)}
                        />
                        <button className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-orange-500/30">
                            {loading ? <div className="loader mx-auto !border-white !border-t-transparent" /> : "LACAK PESANAN"}
                        </button>
                    </form>

                    {order && order !== "NOT_FOUND" && order !== "ERROR" && (
                        <div className="glass p-6 rounded-3xl shadow-xl shadow-orange-500/10 animate-in fade-in zoom-in duration-500">
                            <h2 className="text-slate-500 text-xs font-bold uppercase mb-6 tracking-widest">Pesanan: {order.orderCode}</h2>
                            
                            <div className="flex items-center gap-4 p-4 bg-white/50 rounded-2xl border border-orange-100">
                                <div className={`w-10 h-10 rounded-full ${getStatusDisplay(order.status).color} flex items-center justify-center`}>
                                    <span className="text-white font-bold text-xs uppercase">
                                        {order.status.charAt(0)}
                                    </span>
                                </div>
                                <div>
                                    <p className="text-slate-400 text-[10px] uppercase font-bold">Status Saat Ini</p>
                                    <p className="font-black text-slate-800 text-lg">{getStatusDisplay(order.status).label}</p>
                                </div>
                            </div>

                            <div className="mt-8 pt-6 border-t border-orange-100 flex justify-between items-center">
                                <span className="text-slate-400 font-medium">Total Tagihan</span>
                                <span className="text-xl font-extrabold text-slate-800">Rp {parseInt(order.total).toLocaleString('id-ID')}</span>
                            </div>
                        </div>
                    )}
                    
                    {order === "NOT_FOUND" && <p className="text-center text-red-400 font-bold">Pesanan tidak ditemukan.</p>}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
