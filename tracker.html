<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lacak Pesanan - MANSIX MARKET</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { 500: '#f97316' } }
                }
            }
        }
    </script>
    <style>
        body { background: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #f97316; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-100">
    <div id="root" class="min-h-screen flex justify-center"></div>

    <script type="text/babel">
        function App() {
            const [query, setQuery] = React.useState('');
            const [data, setData] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');

            const searchOrder = async (e) => {
                e.preventDefault();
                setLoading(true); setError(''); setData(null);
                try {
                    const res = await fetch("https://script.google.com/macros/s/AKfycbwBODV8hs85b-M6aJUMOmmEEWZl02IGRNgzQCvAQkFXk_kbk4IHAB-TxK-gbp4fxqAAxQ/exec");
                    const json = await res.json();
                    const found = json.find(i => i.orderCode.toString().toUpperCase() === query.toUpperCase());
                    if (found) setData(found); else setError('Pesanan tidak ditemukan.');
                } catch { setError('Terjadi kesalahan koneksi.'); }
                setLoading(false);
            };

            return (
                <div className="w-full max-w-md p-6 flex flex-col items-center">
                    <div className="fixed inset-0 z-[-1] bg-gradient-to-br from-slate-900 via-orange-900/20 to-slate-900"></div>
                    <header className="w-full mb-10 flex items-center gap-4">
                        <button onClick={() => window.history.back()} className="p-3 glass rounded-2xl hover:bg-white/10 transition">←</button>
                        <h1 className="text-xl font-bold">Lacak Pesanan</h1>
                    </header>

                    <form onSubmit={searchOrder} className="w-full glass p-2 rounded-3xl mb-8 flex gap-2">
                        <input className="flex-1 bg-transparent p-4 outline-none uppercase font-bold tracking-widest text-sm" placeholder="MASUKKAN KODE..." value={query} onChange={e => setQuery(e.target.value)} />
                        <button className="bg-orange-500 p-4 rounded-2xl font-bold px-6">{loading ? <div className="loader" /> : 'Cari'}</button>
                    </form>

                    {error && <div className="text-red-400 font-bold">{error}</div>}

                    {data && (
                        <div className="w-full glass p-8 rounded-3xl animate-in fade-in duration-500">
                            <p className="text-orange-500 font-bold text-xs uppercase tracking-widest mb-1">Status Pesanan</p>
                            <h2 className="text-3xl font-black mb-8">{data.status.replace('_', ' ').toUpperCase()}</h2>
                            
                            <div className="flex justify-between items-center pt-6 border-t border-white/10">
                                <span className="text-slate-400">Total Harga</span>
                                <span className="text-2xl font-black">Rp{Number(data.total).toLocaleString('id-ID')}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
