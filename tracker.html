<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lacak Pesanan - MANSIX MARKET</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { 500: '#f97316' } },
                    animation: { 'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)' },
                    keyframes: { slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); }
        .loader { width: 24px; height: 24px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800">
    <div id="root" class="min-h-screen w-full max-w-md mx-auto relative overflow-hidden">
        <!-- Ambient Background -->
        <div class="fixed inset-0 z-0">
            <div class="absolute top-[-10%] right-[-10%] w-72 h-72 bg-orange-200 rounded-full blur-[100px]"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-72 h-72 bg-blue-100 rounded-full blur-[100px]"></div>
        </div>
    </div>

    <script type="text/babel">
        function App() {
            const [query, setQuery] = React.useState('');
            const [data, setData] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState('');

            const searchOrder = async (e) => {
                e.preventDefault();
                setLoading(true); setError(''); setData(null);
                try {
                    const res = await fetch("https://script.google.com/macros/s/AKfycbwBODV8hs85b-M6aJUMOmmEEWZl02IGRNgzQCvAQkFXk_kbk4IHAB-TxK-gbp4fxqAAxQ/exec");
                    const json = await res.json();
                    const found = json.find(i => i.orderCode.toString().toUpperCase() === query.toUpperCase());
                    if (found) setData(found); else setError('Pesanan tidak ditemukan.');
                } catch { setError('Terjadi kesalahan koneksi.'); }
                setLoading(false);
            };

            return (
                <div className="relative z-10 p-6">
                    <header className="mb-10 flex items-center gap-4">
                        <button onClick={() => window.history.back()} className="w-10 h-10 flex items-center justify-center bg-white shadow-sm rounded-full text-slate-600">←</button>
                        <h1 className="text-lg font-bold">Lacak Pesanan</h1>
                    </header>

                    <form onSubmit={searchOrder} className="glass p-2 rounded-3xl mb-8 flex shadow-sm">
                        <input className="flex-1 bg-transparent p-4 outline-none uppercase font-bold tracking-widest text-sm pl-4" placeholder="KODE PESANAN..." value={query} onChange={e => setQuery(e.target.value)} />
                        <button className="bg-slate-900 text-white p-4 rounded-2xl font-black px-6 hover:bg-black transition active:scale-95">
                            {loading ? <span className="loader"></span> : 'LACAK'}
                        </button>
                    </form>

                    {error && <div className="text-red-500 font-bold text-center animate-bounce">{error}</div>}

                    {data && (
                        <div className="glass p-8 rounded-[2rem] shadow-xl animate-slide-up">
                            <p className="text-orange-500 font-black text-[10px] uppercase tracking-widest mb-1">Status Pesanan</p>
                            <h2 className="text-3xl font-black mb-10">{data.status.replace('_', ' ').toUpperCase()}</h2>
                            
                            <div className="flex justify-between items-center pt-6 border-t border-slate-200">
                                <span className="text-slate-500 font-bold text-xs uppercase">Total Bayar</span>
                                <span className="text-2xl font-black text-slate-900">Rp{Number(data.total).toLocaleString('id-ID')}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
