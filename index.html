<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MANSIX MARKET</title>
     
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Style untuk Footer Modern OSIS */
        .footer-osis {
            background-color: #0f172a; 
            color: #94a3b8;            
            text-align: center;        
            padding: 24px 16px;           
            width: 100%;
            font-size: 11px;           
            font-weight: 600;
            letter-spacing: 0.5px;     
            border-top: 1px solid #1e293b; 
        }
        .footer-osis p {
            margin: 0;
            transition: color 0.3s ease;
        }
        .footer-osis:hover p {
            color: #f8fafc;            
        }
    </style>
</head>
<body class="antialiased flex justify-center items-start min-h-screen">

    <!-- Container Utama (Centered Mobile Frame) -->
    <div id="root" class="w-full max-w-md min-h-screen bg-white shadow-2xl relative flex flex-col overflow-x-hidden"></div>

    <script type="text/babel">
        // --- KONFIGURASI ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx6oyMJASYij4ifZZegBSyfqMTTl4rQhUV-uTMus8oswlv5JrCv5lakHhQunLpRjGmvnA/exec"; 

        // --- STABLE CUSTOM INLINE SVG ICONS ---
        const ChevronLeft = ({ className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        );
        const Search = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.637 10.637z" />
            </svg>
        );
        const MenuIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        );
        const MapPin = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
            </svg>
        );
        const Clock = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );
        const Calendar = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
        );
        const ShoppingBag = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
            </svg>
        );
        const Plus = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
        );
        const Minus = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 12h-15" />
            </svg>
        );
        const XIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        );
        const UserIcon = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
        );
        const CheckCircle2 = ({ className = "w-10 h-10" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );
        const MessageCircle = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
        );
        const AlertTriangle = ({ className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
        );
        const Star = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" className={className}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
        );
        const Flame = ({ className = "w-4 h-4" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1A3.75 3.75 0 0012 18z" />
            </svg>
        );
        const CreditCard = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-5.25 1.5h15.75a.75.75 0 00.75-.75V6.75a.75.75 0 00-.75-.75H3.75a.75.75 0 00-.75.75v10.5a.75.75 0 00.75.75z" />
            </svg>
        );

        // --- DATA ---
        const HOLIDAYS = ["2023-12-25", "2024-01-01"];
        
        const CLASSES = [
            { grade: "Kelas X", items: Array.from({length: 7}, (_, i) => `X-${i+1}`) },
            { grade: "Kelas XI", items: Array.from({length: 6}, (_, i) => `XI-${i+1}`) },
            { grade: "Kelas XII", items: Array.from({length: 4}, (_, i) => `XII-${i+1}`) }
        ];

        const PRODUCTS = [
            { 
                id: 1, 
                name: "Mochi", 
                price: 5000, 
                category: "Snack", 
                description: "Nikmati sensasi kenyalnya mochi khas Jepang dengan isian kekinian yang melimpah. Bikin nagih di setiap gigitan! \n\nPilihan Varian:\n• Oreo Cheese: Kombinasi sempurna renyah-manisnya biskuit Oreo dan krim keju (cream cheese) yang gurih lembut. Definisi happy yang sesungguhnya! 🍪🧀\n• Choco Cheese: Paduan klasik cokelat premium yang manis legit dengan gurihnya keju yang lumer. Pas banget buat nemenin hari kamu! 🍫🧀", 
                rating: 4.8, 
                prepTime: "10 Min", 
                calories: "450 kkal", 
                image: "https://i.ibb.co.com/m5mPFz2b/IMG-20260703-WA0010.jpg",
                variants: ["Oreo Cheese", "Choco Cheese"]
            },
            
            { 
                id: 2, 
                name: "Sandwich", 
                price: 17000, 
                category: "Sandwich", 
                description: "Ini dia pilihan menu sarapan yang gurih dan mengenyangkan\n\nPilihan Varian:\n• Ayam Katsu: Fillet dada ayam pilihan yang digoreng krispi dengan balutan tepung roti keemasan. Renyah di luar, tetap juicy di dalam! 🍗✨\n• Beef Patty: Daging sapi cincang premium yang dibumbui gurih dan dipanggang sempurna. Tebal, empuk, dan kaya rasa! 🥩🔥\n•Dada Ayam Lada Hitam: Potongan dada ayam empuk yang ditumis dengan saus lada hitam khas yang meresap. Perpaduan rasa manis-gurih dengan sensasi hangat yang pas! 🌶️👨‍🍳 ", 
                rating: 4.7, 
                prepTime: "10 Min", 
                calories: "400 kkal", 
                image: "https://i.ibb.co.com/H15pyVz/IMG-20260111-WA0002.jpg",
                variants: ["Beef Patty", "Ayam Katsu", "Dada Ayam Lada Hitam"]
            },
        ];

        // --- UTILS ---
        const formatRupiah = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        
        const generateUniqueCode = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; 
            let result = '';
            for (let i = 0; i < 5; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        };
        
        const getNext7Days = () => {
            const dates = [];
            const today = new Date();
            for (let i = 0; i < 7; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                dates.push(d);
            }
            return dates;
        };
        
        const isDateDisabled = (date) => {
            const day = date.getDay();
            if (day === 0 || day === 6) return true; // Minggu & Sabtu Libur
            return HOLIDAYS.includes(date.toISOString().split('T')[0]);
        };

        // --- APP UTAMA ---
        function App() {
            const [cart, setCart] = React.useState([]);
            const [view, setView] = React.useState('list'); // 'list' | 'detail' | 'checkout_form' | 'success'
            const [selectedProduct, setSelectedProduct] = React.useState(null);
            const [uniqueOrderCode, setUniqueOrderCode] = React.useState('');
            const [customerDetails, setCustomerDetails] = React.useState({ firstName: '', phone: '', kelas: '', deliveryDate: null, deliveryTime: '09:00' });
            const [isLoading, setIsLoading] = React.useState(false);
            const [errorMessage, setErrorMessage] = React.useState(''); 
            
            // Detail Screen local states
            const [detailQty, setDetailQty] = React.useState(1);
            const [detailVariant, setDetailVariant] = React.useState(null);
            const [detailNotes, setDetailNotes] = React.useState('');

            const totalAmount = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);

            // Buka halaman detail produk terdedikasi
            const handleProductClick = (product) => {
                setSelectedProduct(product);
                setDetailQty(1);
                setDetailVariant(product.variants ? product.variants[0] : null);
                setDetailNotes('');
                setView('detail');
                window.scrollTo(0, 0);
            };

            const handleCloseDetail = () => {
                setSelectedProduct(null);
                setView('list');
                window.scrollTo(0, 0);
            };

            // Tambahkan item dari detail screen ke dalam keranjang
            const commitAddToCart = () => {
                if (!selectedProduct) return;
                
                const variant = detailVariant;
                const notes = detailNotes.trim();
                const qty = detailQty;

                setCart(prev => {
                    // cartId unik berdasarkan: id produk + varian + catatan tambahan
                    const cartId = `${selectedProduct.id}-${variant || 'standard'}-${notes || 'none'}`;
                    const ex = prev.find(i => i.cartId === cartId);
                    if (ex) {
                        return prev.map(i => i.cartId === cartId ? { ...i, quantity: i.quantity + qty } : i);
                    } else {
                        return [...prev, { ...selectedProduct, cartId, quantity: qty, selectedVariant: variant, notes }];
                    }
                });

                setSelectedProduct(null);
                setView('list');
                window.scrollTo(0, 0);
            };

            const updateCartQuantity = (cartId, delta) => {
                setCart(prev => prev.map(i => i.cartId === cartId ? { ...i, quantity: Math.max(1, i.quantity + delta) } : i));
            };

            const removeFromCart = (cartId) => {
                setCart(prev => prev.filter(i => i.cartId !== cartId));
            };
            
            const handlePlaceOrder = async () => {
                const { firstName, phone, kelas, deliveryDate, deliveryTime } = customerDetails;
                if (!firstName || !phone || !kelas) {
                    return setErrorMessage("Mohon lengkapi Nama, WA, dan Kelas Anda.");
                }
                if (!deliveryDate || !deliveryTime) {
                    return setErrorMessage("Mohon pilih Tanggal dan Jam pengiriman terlebih dahulu.");
                }

                setIsLoading(true);
                const code = generateUniqueCode();
                setUniqueOrderCode(code);

                // Kirim ke Google Sheets jika valid URL
                if (GOOGLE_SCRIPT_URL.startsWith("http")) {
                    const fd = new FormData();
                    fd.append('orderCode', code);
                    fd.append('firstName', firstName);
                    fd.append('kelas', kelas);
                    fd.append('phone', phone);
                    fd.append('deliveryDate', deliveryDate.toLocaleDateString('id-ID'));
                    fd.append('deliveryTime', deliveryTime);
                    
                    const itemsString = cart.map(i => {
                        const variantStr = i.selectedVariant ? ` [Varian: ${i.selectedVariant}]` : '';
                        const notesStr = i.notes ? ` (Catatan: "${i.notes}")` : '';
                        return `${i.name}${variantStr}${notesStr} (${i.quantity}x)`;
                    }).join(", ");
                    
                    fd.append('items', itemsString);
                    fd.append('totalAmount', totalAmount + 2000); // Subtotal + Biaya Layanan Rp2.000
                    try { 
                        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' }); 
                    } catch (e) { 
                        console.error(e); 
                    }
                }

                setTimeout(() => { 
                    setIsLoading(false); 
                    setView('success'); 
                    window.scrollTo(0, 0);
                }, 2000);
            };

            const handleResetApp = () => {
                setCart([]);
                setCustomerDetails({ firstName: '', phone: '', kelas: '', deliveryDate: null, deliveryTime: '09:00' });
                setView('list');
                window.scrollTo(0, 0);
            };

            return (
                <div className="flex-1 flex flex-col justify-between min-h-screen bg-white">
                    <div className="flex-1 flex flex-col">
                        
                        {/* HEADER NAVIGATION - HANYA DI TAMPILKAN DI HALAMAN BERANDA (LIST) */}
                        {view === 'list' && (
                            <header className="bg-white sticky top-0 z-30 shadow-sm border-b animate-in fade-in duration-200">
                                <div className="flex items-center justify-between p-4">
                                    <h1 onClick={() => setView('list')} className="font-extrabold text-orange-500 tracking-tighter text-xl cursor-pointer">MANSIX MARKET</h1>
                                    <div className="flex items-center gap-3">
                                        <button className="p-1 text-slate-400 hover:text-orange-500 transition-colors">
                                            <Search className="w-5 h-5" />
                                        </button>
                                        <button className="p-1 text-slate-400 hover:text-orange-500 transition-colors">
                                            <MenuIcon className="w-5 h-5" />
                                        </button>
                                    </div>
                                </div>
                            </header>
                        )}

                        {/* RENDER VIEW SCREEN */}
                        <main className="flex-1 flex flex-col">
                            {view === 'list' && (
                                <ProductListScreen 
                                    products={PRODUCTS} 
                                    onProductClick={handleProductClick} 
                                />
                            )}

                            {view === 'detail' && selectedProduct && (
                                <ProductDetailScreen 
                                    product={selectedProduct}
                                    onBack={handleCloseDetail}
                                    detailQty={detailQty}
                                    setDetailQty={setDetailQty}
                                    detailVariant={detailVariant}
                                    setDetailVariant={setDetailVariant}
                                    detailNotes={detailNotes}
                                    setDetailNotes={setDetailNotes}
                                    commitAddToCart={commitAddToCart}
                                />
                            )}
                            
                            {view === 'checkout_form' && (
                                <CheckoutScreen 
                                    cart={cart}
                                    details={customerDetails}
                                    setDetails={setCustomerDetails}
                                    onBack={() => setView('list')}
                                    onRemove={removeFromCart}
                                    onUpdateQuantity={updateCartQuantity}
                                    onOrder={handlePlaceOrder}
                                    subtotal={totalAmount}
                                    isLoading={isLoading}
                                    setErrorMessage={setErrorMessage}
                                    CLASSES={CLASSES}
                                />
                            )}

                            {view === 'success' && (
                                <SuccessScreen 
                                    onReset={handleResetApp} 
                                    orderCode={uniqueOrderCode} 
                                    details={customerDetails}
                                    totalPayment={totalAmount + 2000}
                                />
                            )}
                        </main>
                    </div>

                    {/* FLOATING CART BAR */}
                    {view === 'list' && totalItems > 0 && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-6 z-40">
                            <button 
                                onClick={() => {
                                    setView('checkout_form');
                                    window.scrollTo(0, 0);
                                }}
                                className="w-full bg-orange-500 text-white p-4 rounded-[24px] flex items-center justify-between shadow-2xl animate-float transition-all hover:bg-orange-600 active:scale-[0.98]"
                            >
                                <div className="flex items-center gap-4">
                                    <div className="relative bg-white/20 p-2.5 rounded-2xl">
                                        <ShoppingBag className="w-5 h-5" />
                                        <span className="absolute -top-1.5 -right-1.5 bg-white text-orange-500 text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-orange-500">
                                            {totalItems}
                                        </span>
                                    </div>
                                    <div className="text-left">
                                        <p className="text-[9px] font-bold opacity-80 uppercase tracking-widest leading-none mb-1">Item Ditambahkan</p>
                                        <p className="text-sm font-black">Lihat Detail Keranjang</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs font-black italic">Rp{(totalAmount).toLocaleString('id-ID')}</p>
                                    <p className="text-[9px] font-bold opacity-80">Take Away Only</p>
                                </div>
                            </button>
                        </div>
                    )}

                    {/* CUSTOM ALERT POPUP MODAL */}
                    {errorMessage && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="bg-white rounded-3xl p-6 max-w-xs w-full shadow-2xl text-center border border-gray-100">
                                <div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-4 animate-bounce">
                                    <AlertTriangle className="w-6 h-6" />
                                </div>
                                <h3 className="font-extrabold text-gray-900 text-base mb-2">Pemberitahuan</h3>
                                <p className="text-gray-500 text-xs mb-6 leading-relaxed font-semibold">{errorMessage}</p>
                                <button 
                                    onClick={() => setErrorMessage('')} 
                                    className="w-full py-3.5 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-2xl transition shadow-lg shadow-orange-100 text-xs active:scale-95"
                                >
                                    Selesai
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SCREEN: HOME CATALOG SCREEN ---
        function ProductListScreen({ products, onProductClick }) {
            const categories = ['SEMUA', ...Array.from(new Set(products.map(p => p.category)))];

                                                            className="p-1 text-slate-400 hover:text-slate-800 transition-colors"
                                                        >
                                                            <Minus className="w-3 h-3 stroke-[2.5]" />
                                                        </button>
                                                        <span className="text-xs font-black text-slate-800 w-4 text-center">{item.quantity}</span>
                                                        <button 
                                                            type="button" 
                                                            onClick={() => onUpdateQuantity(item.cartId, 1)} 
                                                            className="p-1 text-orange-500 hover:text-orange-600 transition-colors"
                                                        >
                                                            <Plus className="w-3 h-3 stroke-[2.5]" />
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Tombol Hapus */}
                                            <button 
                                                onClick={() => onRemove(item.cartId)} 
                                                className="absolute top-4 right-4 text-slate-300 hover:text-red-500 p-1 rounded-lg hover:bg-red-50 transition"
                                                title="Hapus Item"
                                            >
                                                <XIcon className="w-4.5 h-4.5" />
                                            </button>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {/* METODE PEMBAYARAN */}
                        <div className="bg-gradient-to-r from-orange-500 to-amber-500 text-white rounded-3xl p-5 shadow-lg shadow-orange-100 flex gap-4 items-start border border-orange-400">
                            <div className="bg-white/20 p-2.5 rounded-2xl flex-shrink-0 mt-0.5">
                                <CreditCard className="w-5 h-5 text-white" />
                            </div>
                            <div>
                                <h4 className="font-extrabold text-sm mb-1 text-white">Metode Pembayaran COD / QRIS</h4>
                                <p className="text-xs leading-relaxed text-white/90">
                                    Pesanan dibayar saat Anda mengambil makanan di Ruang OSIS. Kami menerima <b>Uang Tunai (Cash)</b> maupun pembayaran non-tunai via <b>Scan QRIS OSIS</b> langsung di tempat!
                                </p>
                            </div>
                        </div>

                        {/* RINCIAN NOTA BIAYA */}
                        <div className="bg-slate-50 rounded-3xl p-5 space-y-4 border border-slate-100">
                            <div className="flex justify-between text-xs font-extrabold text-slate-400">
                                <span>Subtotal</span>
                                <span className="text-slate-800 font-black">{formatRupiah(subtotal)}</span>
                            </div>
                            <div className="flex justify-between text-xs font-extrabold text-slate-400">
                                <span>Biaya Layanan (Platform)</span>
                                <span className="text-slate-800 font-black">Rp2.000</span>
                            </div>
                            <div className="flex justify-between items-center border-t border-dashed border-slate-200 pt-4 mt-2">
                                <span className="font-extrabold text-xs uppercase tracking-wider text-slate-400">Total Pembayaran</span>
                                <span className="text-xl font-black text-orange-500 italic">{formatRupiah(isCartEmpty ? 0 : subtotal + 2000)}</span>
                            </div>
                        </div>
                    </div>

                    {/* STICKY FOOTER ACTION */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-white border-t border-slate-100 z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
                        <button 
                            onClick={onOrder} 
                            disabled={isLoading || !isFormValid || isCartEmpty}
                            className={`w-full py-5 rounded-2xl font-extrabold text-sm shadow-xl transition-all ${
                                (isFormValid && !isCartEmpty) && !isLoading
                                    ? 'bg-orange-500 text-white shadow-orange-100 hover:bg-orange-600 cursor-pointer active:scale-95'
                                    : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                            }`}
                        >
                            {isLoading ? 'Memproses Pesanan...' : 'Pesan Sekarang'}
                        </button>
                        <p className="text-center text-[10px] text-slate-400 mt-4 italic font-semibold leading-relaxed">
                            Pastikan Nama & Kelas diisi dengan benar untuk mempermudah serah terima pesanan Anda di Ruang OSIS.
                        </p>
                    </div>

                    {/* CUSTOM CLASS DRAWER MODAL (POPUP PILIHAN KELAS MODERN) */}
                    {isClassModalOpen && (
                        <div className="fixed inset-0 z-[110] flex items-end justify-center p-0 bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="absolute inset-0" onClick={() => setIsClassModalOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white rounded-t-[32px] p-6 shadow-2xl border-t border-slate-100 max-h-[80vh] overflow-y-auto no-scrollbar animate-in slide-in-from-bottom duration-300 pb-12 z-20">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-base font-black text-slate-900 tracking-tight">Pilih Kelas Kamu</h3>
                                    <button 
                                        type="button"
                                        onClick={() => setIsClassModalOpen(false)}
                                        className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 hover:text-slate-800 transition"
                                    >
                                        <XIcon className="w-4 h-4 stroke-[3]" />
                                    </button>
                                </div>
                                <div className="space-y-6">
                                    {CLASSES.map(group => (
                                        <div key={group.grade} className="space-y-2">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{group.grade}</h4>
                                            <div className="grid grid-cols-4 gap-2">
                                                {group.items.map(item => {
                                                    const isSelected = details.kelas === item;
                                                    return (
                                                        <button
                                                            type="button"
                                                            key={item}
                                                            onClick={() => {
                                                                setDetails(prev => ({ ...prev, kelas: item }));
                                                                setIsClassModalOpen(false);
                                                            }}
                                                            className={`py-3 rounded-xl text-xs font-extrabold transition-all border-2 active:scale-95 ${
                                                                isSelected 
                                                                    ? 'bg-orange-500 border-orange-500 text-white shadow-md shadow-orange-100' 
                                                                    : 'bg-slate-50 border-slate-100 text-slate-600 hover:bg-slate-100'
                                                            }`}
                                                        >
                                                            {item}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SCREEN: NOTA PEMBAYARAN SUKSES ---
        function SuccessScreen({ onReset, orderCode, details, totalPayment }) {
            const formattedDate = details.deliveryDate 
                ? details.deliveryDate.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
                : '';

            return (
                <div className="flex flex-col items-center justify-center min-h-[85vh] text-center p-6 animate-in zoom-in duration-300">
                    <div className="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto shadow-md mb-6">
                        <CheckCircle2 className="w-10 h-10" />
                    </div>
                    <div className="space-y-1 bg-green-50/50 p-4 rounded-2xl border border-green-100/50 max-w-xs mx-auto">
                        <h3 className="text-xl font-black text-slate-800">Pesanan Diterima!</h3>
                        <p className="text-xs text-slate-500 leading-normal font-semibold">Tunjukkan kode nota di bawah saat mengambil pesanan di Ruang OSIS.</p>
                    </div>

                    {/* RECEIPT DETAIL BOX */}
                    <div className="bg-slate-50 rounded-2xl p-4 text-left space-y-3 border border-slate-200/60 text-xs w-full max-w-xs mt-6 mb-8 shadow-sm">
                        <div className="flex justify-between pb-2 border-b border-dashed border-slate-200">
                            <span className="text-slate-400 font-semibold">Pemesan</span>
                            <span className="font-extrabold text-slate-800">{details.firstName}</span>
                        </div>
                        <div className="flex justify-between pb-2 border-b border-dashed border-slate-200">
                            <span className="text-slate-400 font-semibold">Kelas</span>
                            <span className="font-extrabold text-slate-800 uppercase">{details.kelas}</span>
                        </div>
                        <div className="flex justify-between pb-2 border-b border-dashed border-slate-200">
                            <span className="text-slate-400 font-semibold">Jadwal Ambil</span>
                            <span className="font-extrabold text-orange-600">{formattedDate} ({details.deliveryTime} WIB)</span>
                        </div>
                        <div className="flex justify-between pb-2 border-b border-dashed border-slate-200">
                            <span className="text-slate-400 font-semibold">Pembayaran</span>
                            <span className="font-extrabold text-slate-800">COD / QRIS di OSIS</span>
                        </div>
                        <div className="flex justify-between pt-1">
                            <span className="text-slate-400 font-semibold">Total Tagihan</span>
                            <span className="font-black text-slate-800">{formatRupiah(totalPayment)}</span>
                        </div>
                    </div>

                    {/* KODE PESANAN CARD */}
                    <div className="bg-orange-50 border-2 border-dashed border-orange-200 p-6 rounded-2xl w-full max-w-xs mb-8 shadow-sm">
                        <p className="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2">KODE PESANAN</p>
                        <div className="text-4xl font-black text-slate-800 tracking-widest font-mono">{orderCode}</div>
                    </div>

                    <div className="w-full max-w-xs space-y-3">
                        <button 
                            onClick={() => window.open(`https://wa.me/6289604286165?text=Halo%20Mansix%20Market,%20saya%20butuh%20bantuan%20terkait%20pesanan%20dengan%20Kode%20Pesanan%20${orderCode}`, '_blank')} 
                            className="w-full py-4 bg-green-50 text-green-700 border border-green-200 rounded-2xl font-extrabold text-xs flex items-center justify-center gap-2 hover:bg-green-100 transition active:scale-[0.98]"
                        >
                            <MessageCircle className="w-5 h-5" /> Butuh Bantuan?
                        </button>
                        <button 
                            onClick={onReset} 
                            className="w-full py-4 bg-gray-900 text-white rounded-2xl font-extrabold text-xs hover:bg-black transition active:scale-[0.98]"
                        >
                            Kembali ke Menu
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
