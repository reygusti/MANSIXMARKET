        // --- SCREEN: TRACKER PESANAN ---
        function TrackerScreen() {
            const [query, setQuery] = React.useState('');
            const [order, setOrder] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            const handleSearch = async (e) => {
                e.preventDefault();
                const cleanQuery = query.trim();
                if (!cleanQuery) return;

                setLoading(true);
                setOrder(null);

                try {
                    const res = await fetch(TRACKER_SCRIPT_URL);
                    if (!res.ok) throw new Error('Gagal mengambil data pesanan');
                    const data = await res.json();
                    const rows = Array.isArray(data) ? data : [];
                    const found = rows.find(item =>
                        String(item.orderCode || '').toUpperCase() === cleanQuery.toUpperCase()
                    );
                    setOrder(found || 'NOT_FOUND');
                } catch (error) {
                    console.error(error);
                    setOrder('ERROR');
                } finally {
                    setLoading(false);
                }
            };

            const getStatusDisplay = (status) => {
                const s = String(status || 'process').toLowerCase();
                if (s === 'canceled' || s === 'cancelled' || s === 'dibatalkan') {

                        {order && typeof order === 'object' && (

                                            {line.substring(line.indexOf(':') + 1)}

                                    ) : (
                                        line.substring(1)
                                    )}

                            </div>

                    } else if (line.trim() !== '') {

        // --- SCREEN: CHECKOUT ---
        function CheckoutScreen({ cart, details, setDetails, onBack, onRemove, onUpdateQuantity, onOrder, subtotal, isLoading, showToast, CLASSES }) {
            const availableDates = getNext7Days();
            const [isClassModalOpen, setIsClassModalOpen] = React.useState(false);

            return (
                <div className="flex-1 flex flex-col bg-transparent animate-fade-in relative min-h-screen">
                    <header className="bg-white/70 backdrop-blur-xl sticky top-0 z-30 px-5 py-4 flex items-center gap-4 border-b border-slate-100/50">
                        <button onClick={onBack} className="w-10 h-10 flex items-center justify-center bg-white border border-slate-200 shadow-sm rounded-full text-slate-600 transition hover:bg-slate-50 active:scale-90">
                            <Icon.ChevronLeft className="w-5 h-5 ml-[-2px]" />
                        </button>
                        <h2 className="text-lg font-bold text-slate-800">Checkout</h2>
                    </header>

                    <div className="px-5 pt-4 pb-32 space-y-5 relative z-10">
                        
                        <section className="bg-white/80 backdrop-blur-md p-5 rounded-3xl border border-white/60 shadow-sm">
                            <h3 className="font-bold text-sm text-slate-800 mb-4 flex items-center gap-2">
                                <div className="w-7 h-7 bg-brand-50 text-brand-500 rounded-full flex items-center justify-center"><Icon.User className="w-4 h-4" /></div>
                                Informasi Pemesan
                            </h3>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-semibold text-slate-500 mb-1.5 block">Nama Lengkap</label>
                                    <input 
                                        type="text" value={details.firstName} onChange={(e) => setDetails({...details, firstName: e.target.value})}
                                        className="w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm focus:border-brand-400 focus:ring-2 focus:ring-brand-50 outline-none transition font-medium shadow-sm" 
                                        placeholder="Contoh: Budi Santoso"
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-xs font-semibold text-slate-500 mb-1.5 block">Nomor WhatsApp</label>
                                        <input 
                                            type="tel" value={details.phone} onChange={(e) => setDetails({...details, phone: e.target.value})}
                                            className="w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm focus:border-brand-400 focus:ring-2 focus:ring-brand-50 outline-none transition font-medium shadow-sm" 
                                            placeholder="0812..."
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-500 mb-1.5 block">Kelas</label>
                                        <div className="relative">
                                            <button 
                                                type="button"
                                                onClick={() => setIsClassModalOpen(true)}
                                                className="w-full bg-white border border-slate-200 rounded-xl p-3.5 text-sm focus:border-brand-400 focus:ring-2 focus:ring-brand-50 outline-none transition text-left flex justify-between items-center shadow-sm"
                                            >
                                                <span className={details.kelas ? "text-slate-800 font-bold" : "text-slate-400 font-medium"}>
                                                    {details.kelas || "Pilih..."}
                                                </span>
                                                <Icon.ChevronLeft className="w-4 h-4 -rotate-90 text-slate-400" />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section className="bg-white/80 backdrop-blur-md p-5 rounded-3xl border border-white/60 shadow-sm">
                            <h3 className="font-bold text-sm text-slate-800 mb-4 flex items-center gap-2">
                                <div className="w-7 h-7 bg-brand-50 text-brand-500 rounded-full flex items-center justify-center"><Icon.Clock className="w-4 h-4" /></div>
                                Jadwal Ambil (OSIS)
                            </h3>
                            
                            <label className="text-xs font-semibold text-slate-500 mb-2.5 block">Pilih Tanggal</label>
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-2">
                                {availableDates.map((d, i) => {
                                    const isDisabled = isDateDisabled(d);
                                    const isSel = details.deliveryDate && details.deliveryDate.toDateString() === d.toDateString();
                                    return (
                                        <button 
                                            key={i} onClick={() => !isDisabled && setDetails({...details, deliveryDate: d})} disabled={isDisabled}
                                            className={`flex-shrink-0 w-[72px] py-3.5 rounded-2xl border-2 flex flex-col items-center justify-center transition active:scale-95 ${
                                                isDisabled ? 'bg-slate-50 border-transparent text-slate-300 opacity-50 cursor-not-allowed' :
                                                isSel ? 'bg-brand-500 border-brand-500 text-white shadow-md shadow-brand-200' : 'bg-white border-slate-100 text-slate-600 hover:border-slate-300 shadow-sm'
                                            }`}
                                        >
                                            <span className="text-[10px] font-bold uppercase tracking-wider">{d.toLocaleDateString('id-ID', { weekday: 'short' })}</span>
                                            <span className="text-xl font-black mt-0.5">{d.getDate()}</span>
                                        </button>
                                    )
                                })}
                            </div>

                            <label className="text-xs font-semibold text-slate-500 mb-2.5 block mt-3">Pilih Jam</label>
                            <div className="grid grid-cols-2 gap-3">
                                {['09:00', '12:00'].map(t => (
                                    <button 
                                        key={t} onClick={() => setDetails({...details, deliveryTime: t})}
                                        className={`py-3.5 rounded-xl border-2 font-bold text-sm transition active:scale-95 ${
                                            details.deliveryTime === t ? 'bg-slate-800 border-slate-800 text-white shadow-md' : 'bg-white border-slate-100 text-slate-600 hover:bg-slate-50 shadow-sm'
                                        }`}
                                    >
                                        {t} WIB
                                    </button>
                                ))}
                            </div>
                        </section>

                        <section className="bg-white/80 backdrop-blur-md p-5 rounded-3xl border border-white/60 shadow-sm">
                            <h3 className="font-bold text-sm text-slate-800 mb-4 flex items-center gap-2">
                                <div className="w-7 h-7 bg-brand-50 text-brand-500 rounded-full flex items-center justify-center"><Icon.ShoppingBag className="w-4 h-4" /></div>
                                Pesanan Anda
                            </h3>
                            <div className="space-y-4">
                                {cart.map(item => (
                                    <div key={item.cartId} className="flex gap-4">
                                        <div className="w-16 h-16 rounded-2xl bg-white overflow-hidden flex-shrink-0 border border-slate-100 shadow-sm">
                                            <img src={item.image} className="w-full h-full object-cover" alt={item.name} />
                                        </div>
                                        <div className="flex-1 flex flex-col justify-center">
                                            <div className="flex justify-between items-start">
                                                <h4 className="font-bold text-sm text-slate-800 leading-tight">{item.name}</h4>
                                                <button onClick={() => onRemove(item.cartId)} className="text-slate-300 hover:text-red-500 bg-white shadow-sm border border-slate-100 rounded-full p-1"><Icon.X className="w-4 h-4" /></button>
                                            </div>
                                            {(item.selectedVariant || item.notes) && (
                                                <p className="text-[10px] text-slate-500 font-medium line-clamp-1 mt-0.5">
                                                    {item.selectedVariant} {item.notes && `• ${item.notes}`}
                                                </p>
                                            )}
                                            <div className="flex justify-between items-center mt-2.5">
                                                <span className="font-black text-sm text-brand-600">{formatRupiah(item.price)}</span>
                                                <div className="flex items-center gap-3 bg-white rounded-lg p-1 border border-slate-100 shadow-sm">
                                                    <button onClick={() => onUpdateQuantity(item.cartId, -1)} className="w-6 h-6 flex items-center justify-center text-slate-500"><Icon.Minus className="w-3 h-3" /></button>
                                                    <span className="text-xs font-bold w-2 text-center">{item.quantity}</span>
                                                    <button onClick={() => onUpdateQuantity(item.cartId, 1)} className="w-6 h-6 flex items-center justify-center text-brand-500"><Icon.Plus className="w-3 h-3" /></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="bg-white/80 backdrop-blur-md p-5 rounded-3xl border border-white/60 shadow-sm space-y-4">
                            <div className="flex justify-between text-sm">
                                <span className="text-slate-500 font-medium">Subtotal Pesanan</span>
                                <span className="font-bold text-slate-800">{formatRupiah(subtotal)}</span>
                            </div>
                            <div className="border-t border-dashed border-slate-200 pt-4 flex justify-between items-center">
                                <span className="font-bold text-slate-800">Total Pembayaran</span>
                                <span className="text-xl font-black text-brand-600">{formatRupiah(subtotal)}</span>
                            </div>
                            <div className="bg-amber-50/80 text-amber-700 text-[10px] p-3 rounded-xl font-bold text-center border border-amber-100 uppercase tracking-widest">
                                Bayar tunai / QRIS di OSIS
                            </div>
                        </section>
                    </div>

                    {/* Checkout Button Bar */}
                    <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-xl border-t border-slate-100 p-4 pb-6 z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
                        <button 
                            onClick={onOrder} 
                            disabled={isLoading || cart.length === 0}
                            className={`w-full h-14 rounded-2xl font-bold text-base flex items-center justify-center transition shadow-lg ${
                                isLoading || cart.length === 0 ? 'bg-slate-200 text-slate-400 shadow-none' : 'bg-slate-900 text-white hover:bg-black shadow-slate-300 active:scale-[0.98]'
                            }`}
                        >
                            {isLoading ? <div className="loader !border-slate-400 !border-t-transparent"></div> : 'Konfirmasi Pesanan'}
                        </button>
                    </div>

                    {/* MODAL POPUP PILIHAN KELAS */}
                    {isClassModalOpen && (
                        <div className="fixed inset-0 z-[110] flex items-end justify-center bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className="absolute inset-0" onClick={() => setIsClassModalOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white rounded-t-[32px] p-6 shadow-2xl border-t border-slate-100 max-h-[80vh] overflow-y-auto no-scrollbar animate-slide-up pb-12 z-20">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-lg font-black text-slate-900 tracking-tight">Pilih Kelas Kamu</h3>
                                    <button 
                                        type="button"
                                        onClick={() => setIsClassModalOpen(false)}
                                        className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500 hover:text-slate-800 transition"
                                    >
                                        <Icon.X className="w-5 h-5" />
                                    </button>
                                </div>
                                <div className="space-y-6">
                                    {CLASSES.map(group => (
                                        <div key={group.grade} className="space-y-3">
                                            <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">{group.grade}</h4>
                                            <div className="grid grid-cols-4 gap-2.5">
                                                {group.items.map(item => {
                                                    const isSelected = details.kelas === item;
                                                    return (
                                                        <button
                                                            type="button"
                                                            key={item}
                                                            onClick={() => {
                                                                setDetails(prev => ({ ...prev, kelas: item }));
                                                                setIsClassModalOpen(false);
                                                            }}
                                                            className={`py-3.5 rounded-xl text-xs font-bold transition-all border-2 active:scale-95 ${
                                                                isSelected 
                                                                    ? 'bg-brand-500 border-brand-500 text-white shadow-md shadow-brand-200' 
                                                                    : 'bg-white border-slate-100 text-slate-600 hover:border-slate-300'
                                                            }`}
                                                        >
                                                            {item}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SCREEN: NOTA SUKSES TIKET DIGITAL (REDESIGN) ---
        function SuccessScreen({ onReset, orderCode, details, totalPayment }) {
            const [isDownloading, setIsDownloading] = React.useState(false);
            const dateStr = details.deliveryDate ? details.deliveryDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) : '';

            const handleDownload = () => {
                setIsDownloading(true);
                const node = document.getElementById('receipt-node');
                
                if (node && window.html2canvas) {
                    window.html2canvas(node, { scale: 3, backgroundColor: '#0f172a' }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Tiket_Mansix_${orderCode}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        setIsDownloading(false);
                    }).catch(err => {
                        console.error("Gagal mendownload struk:", err);
                        setIsDownloading(false);
                    });
                } else {
                    alert("Gagal memuat sistem gambar. Harap screenshot secara manual.");
                    setIsDownloading(false);
                }
            };

            return (
                <div className="flex flex-col min-h-screen bg-slate-900 items-center justify-center p-5 animate-fade-in">
                    
                    {/* CONTAINER TIKET - Ini yang akan didownload */}
                    <div id="receipt-node" className="w-full max-w-[340px] bg-white rounded-2xl shadow-2xl relative overflow-hidden mt-6 pb-2">
                        
                        {/* Bagian Atas Tiket */}
                        <div className="pt-8 pb-5 px-6 text-center bg-brand-50 relative">
                            <div className="w-12 h-12 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-3 shadow-md border-4 border-white">
                                <Icon.CheckCircle className="w-6 h-6" />
                            </div>
                            <h2 className="text-xl font-black text-slate-800 tracking-tight">Pesanan Diterima</h2>
                            <p className="text-xs font-semibold text-slate-500 mt-1 uppercase tracking-wider">Koperasi Mansix</p>
                        </div>

                        {/* Rincian Pemesan */}
                        <div className="py-6 px-6 space-y-4">
                            <div className="flex justify-between items-end">
                                <span className="text-xs font-semibold text-slate-400">Pemesan</span>
                                <span className="text-sm font-bold text-slate-800 text-right">{details.firstName}<br/><span className="text-brand-500">{details.kelas}</span></span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-xs font-semibold text-slate-400">Jadwal Ambil</span>
                                <span className="text-sm font-bold text-slate-800">{dateStr} - {details.deliveryTime} WIB</span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-xs font-semibold text-slate-400">Total Tagihan</span>
                                <span className="text-lg font-black text-slate-900">{formatRupiah(totalPayment)}</span>
                            </div>
                        </div>

                        {/* Garis Pemisah ala Tiket dengan lubang di kiri kanan */}
                        <div className="relative flex items-center py-2">
                            <div className="ticket-cutout-left"></div>
                            <div className="w-full border-t-2 border-dashed border-slate-300"></div>
                            <div className="ticket-cutout-right"></div>
                        </div>

                        {/* Bagian QR & Kode Validasi */}
                        <div className="pt-4 pb-6 px-6 flex flex-col items-center">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Pindai di Kasir OSIS</p>
                            
                            {/* QR CODE GENERATOR */}
                            <div className="p-2 border-2 border-slate-100 rounded-xl mb-3 shadow-sm bg-white">
                                <img 
                                    src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${orderCode}&margin=0`} 
                                    alt="QR Code" 
                                    className="w-28 h-28 object-contain"
                                    crossOrigin="anonymous" 
                                />
                            </div>

                            <p className="text-2xl font-black text-slate-800 tracking-[0.2em] font-mono">{orderCode}</p>
                        </div>
                    </div>

                    {/* Action Buttons di Luar Tiket */}
                    <div className="w-full max-w-[340px] mt-8 space-y-3">
                        <button 
                            onClick={handleDownload} 
                            disabled={isDownloading}
                            className="w-full h-14 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition border border-white/20 disabled:opacity-50 active:scale-95"
                        >
                            {isDownloading ? (
                                <div className="loader !w-5 !h-5 !border-white !border-t-transparent"></div>
                            ) : (
                                <><Icon.Download className="w-5 h-5" /> Simpan Tiket (PNG)</>
                            )}
                        </button>
                        
                        <button onClick={onReset} className="w-full h-14 bg-brand-500 hover:bg-brand-600 text-white rounded-2xl font-bold text-sm transition shadow-lg shadow-brand-500/20 active:scale-95">
                            Pesan Lagi
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
